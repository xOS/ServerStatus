<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <style>
      .status-light {
        animation: status-light-blink 3.2s steps(2, end) infinite;
      }
      .status-light:nth-of-type(4n) {
        animation-delay: 0.4s;
      }
      .status-light:nth-of-type(4n + 1) {
        animation-delay: 0.9s;
      }
      .status-light:nth-of-type(4n + 2) {
        animation-delay: 1.45s;
      }
      .status-light:nth-of-type(4n + 3) {
        animation-delay: 2s;
      }
      @keyframes status-light-blink {
        0%,
        48%,
        100% {
          opacity: 1;
        }
        49%,
        62% {
          opacity: 0.32;
        }
      }
    </style>
  </defs>
  <rect x="5" y="10" width="90" height="22" rx="6" fill="url(#panelGradient)" stroke="#ccc" stroke-width="1.5"/>
  <rect x="5" y="38" width="90" height="22" rx="6" fill="url(#panelGradient)" stroke="#ccc" stroke-width="1.5"/>
  <rect x="5" y="66" width="90" height="22" rx="6" fill="url(#panelGradient)" stroke="#ccc" stroke-width="1.5"/>
  <circle class="status-light" cx="15" cy="21" r="4" fill="#00ff00"/>
