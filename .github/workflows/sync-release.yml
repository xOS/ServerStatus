name: Sync Release to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag; empty uses the latest stable release
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: sync-r2-release
  cancel-in-progress: false

jobs:
  sync-release-to-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            gh release download "${{ inputs.tag }}" --repo ${{ github.repository }} --dir assets --pattern '*'
          else
            gh release download --repo ${{ github.repository }} --dir assets --pattern '*'
          fi

      - name: Sync to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi

          mkdir -p upload_dir/$TAG
          test -s assets/checksums.txt
          cp assets/checksums.txt upload_dir/$TAG/
          find assets -type f -name '*.zip' -exec cp {} upload_dir/$TAG/ \;
          test -n "$(find upload_dir/$TAG -maxdepth 1 -type f -name '*.zip' -print -quit)"
          echo "{\"tag_name\":\"$TAG\"}" > upload_dir/index.json

          aws s3 sync upload_dir/$TAG/ s3://${R2_BUCKET}/serverdash/$TAG/ \
            --cache-control 'public, max-age=31536000, immutable' \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          aws s3 cp upload_dir/index.json s3://${R2_BUCKET}/serverdash/index.json \
            --cache-control 'no-store, max-age=0' \
            --content-type 'application/json' \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
